version: '3.8'

services:
  # Auth Service
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8082:8081"
    environment:
      DB_URL: jdbc:mysql://authdb-mysql:3306/demo_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: 123456
    depends_on:
      - auth-db
    restart: always
    networks:
      - app-network

  auth-db:
    image: mysql:8.0
    container_name: authdb-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: demo_db
    ports:
      - "3308:3306"
    volumes:
      - auth_db_data:/var/lib/mysql
    networks:
      - app-network

  # Order Service
  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:mysql://orderdb-mysql:3306/demo_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: 123456
    depends_on:
      - order-db
    restart: always
    networks:
      - app-network

  order-db:
    image: mysql:8.0
    container_name: orderdb-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: demo_db
    ports:
      - "3307:3306"
    volumes:
      - order_db_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  auth_db_data:
  order_db_data:

networks:
  app-network:
    driver: bridge

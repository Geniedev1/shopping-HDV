
services:
  app:
    build: .
    container_name: auth-service
    ports:
      - "8082:8081"
    environment:
      DB_URL: jdbc:mysql://authdb-mysql:3306/demo_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: 123456
    depends_on:
      - mysql
    restart: always

  mysql:
    image: mysql:8.0
    container_name: authdb-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: demo_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: